# Pre-commit hooks para módulos Odoo 18.
# Instalar con: pre-commit install
# Ejecutar manual: pre-commit run --all-files
---
# default_language_version comentado: deja que pre-commit use el python
# disponible en el host. El target del proyecto (3.12) se valida en CI vía
# la imagen Docker; el host puede tener 3.11 o 3.13.
# default_language_version:
#   python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format

  # pylint-odoo: deshabilitado por ahora. Para reactivar:
  # 1. Generar config: pylint --generate-rcfile > .pylintrc-odoo
  # 2. Ajustar a Odoo 18 + nuestras convenciones
  # 3. Descomentar este bloque
  # - repo: https://github.com/OCA/pylint-odoo
  #   rev: v10.0.2
  #   hooks:
  #     - id: pylint_odoo
  #       args:
  #         - --valid-odoo-versions=18.0

  - repo: https://github.com/PyCQA/isort
    rev: 9.0.0a3
    hooks:
      - id: isort
        args: ['--profile=black']

exclude: |
  (?x)^(
    oca-deps/.*|
    certificates/.*|
    .*/i18n/.*\.po$|
    .*/static/.*|
    LICENSE
  )$
