[options]
; ─── Addons paths ──────────────────────────────────────────────
; Orden: nuestros módulos primero (sobreescriben), luego OCA, luego core del image.
addons_path = /mnt/extra-addons/l10n-peru-ce,/mnt/extra-addons/oca-deps,/usr/lib/python3/dist-packages/odoo/addons

; ─── Filestore ─────────────────────────────────────────────────
data_dir = /var/lib/odoo

; ─── Master password (cambiar tras primer login) ───────────────
admin_passwd = admin

; ─── Proxy / despliegue ────────────────────────────────────────
proxy_mode = True
list_db = True

; ─── Dev: single-process, ideal para hot-reload ───────────────
workers = 0
max_cron_threads = 1

; ─── Límites de request ────────────────────────────────────────
limit_time_cpu = 600
limit_time_real = 1200
limit_memory_soft = 2147483648
limit_memory_hard = 2684354560

; ─── Logging ───────────────────────────────────────────────────
log_level = info
log_handler = :INFO,werkzeug:WARNING
logfile = False

; ─── Locale por defecto (PE) ───────────────────────────────────
load_language = es_PE

; ─── Certificados de firma (lectura) ───────────────────────────
; Los modules de EDI leen los .pfx desde aquí.
; Ver l10n_pe_edi.cert_path en ir.config_parameter.
; default: /opt/odoo/certificates/

; NOTA: db_host/db_user/db_password los inyecta el entrypoint del image
; desde las env vars HOST/USER/PASSWORD del compose.
